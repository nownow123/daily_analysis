name: A Share Tail Picker

on:
  schedule:
    # 06:45 UTC = 14:45 Asia/Shanghai
    - cron: "45 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: a-share-tail-picker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily picker
        id: picker
        run: |
          set -o pipefail
          python3 a_share_tail_picker/cloud_tail_picker.py daily --top 30 --max-detail 160 --workers 8 2>&1 | tee run.log
          report="$(grep '^REPORT=' run.log | tail -1 | cut -d= -f2-)"
          learning_report="$(grep '^LEARNING_REPORT=' run.log | tail -1 | cut -d= -f2-)"
          candidates="$(grep '^CANDIDATES_CSV=' run.log | tail -1 | cut -d= -f2-)"
          echo "report=$report" >> "$GITHUB_OUTPUT"
          echo "learning_report=$learning_report" >> "$GITHUB_OUTPUT"
          echo "candidates=$candidates" >> "$GITHUB_OUTPUT"

      - name: Add report to job summary
        if: always()
        run: |
          {
            echo "## Daily Run"
            echo
            if [ -f "${{ steps.picker.outputs.learning_report }}" ]; then
              cat "${{ steps.picker.outputs.learning_report }}"
              echo
            fi
            if [ -f "${{ steps.picker.outputs.report }}" ]; then
              cat "${{ steps.picker.outputs.report }}"
            else
              echo "No report file was generated."
              echo
              cat run.log || true
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a-share-tail-picker-${{ github.run_number }}
          path: |
            run.log
            a_share_tail_picker/outputs/**
            a_share_tail_picker/learning/**
          if-no-files-found: warn

      - name: Commit generated reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add a_share_tail_picker/outputs a_share_tail_picker/learning run.log || true
          if git diff --cached --quiet; then
            echo "No generated report changes to commit."
          else
            git commit -m "Update A-share tail picker reports"
            git push
          fi

      - name: Publish issue summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ steps.picker.outputs.report }}
          LEARNING_REPORT: ${{ steps.picker.outputs.learning_report }}
        run: |
          title="A股尾盘选股日报"
          body="/tmp/a_share_tail_picker_issue.md"
          {
            echo "自动运行时间：$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
            echo
            echo "> 本报告只做公开行情筛选和策略复盘，不构成买卖指令。"
            echo
            if [ -f "$LEARNING_REPORT" ]; then
              cat "$LEARNING_REPORT"
              echo
            fi
            if [ -f "$REPORT" ]; then
              cat "$REPORT"
            else
              echo "本次未生成选股报告。运行日志："
              echo
              echo '```text'
              tail -120 run.log || true
              echo '```'
            fi
          } > "$body"
          issue="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -z "$issue" ]; then
            gh issue create --title "$title" --body-file "$body" --label "daily-report" || gh issue create --title "$title" --body-file "$body"
          else
            gh issue comment "$issue" --body-file "$body"
          fi

      - name: Send WeCom notification
        if: always()
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          REPORT: ${{ steps.picker.outputs.report }}
          LEARNING_REPORT: ${{ steps.picker.outputs.learning_report }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WECOM_WEBHOOK_URL" ]; then
            echo "WECOM_WEBHOOK_URL secret is not set; skip WeCom notification."
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          webhook = os.environ["WECOM_WEBHOOK_URL"]
          run_url = os.environ["RUN_URL"]
          repo_url = os.environ["REPO_URL"]
          report_path = Path(os.environ.get("REPORT", ""))
          learning_path = Path(os.environ.get("LEARNING_REPORT", ""))

          parts = ["# A股尾盘选股日报", ""]
          if learning_path.exists():
              text = learning_path.read_text(encoding="utf-8", errors="replace")
              parts.append(text[:1200])
              parts.append("")
          if report_path.exists():
              text = report_path.read_text(encoding="utf-8", errors="replace")
              parts.append(text[:2400])
          else:
              parts.append("本次未生成选股报告，请查看 Actions 日志。")
          parts.extend(["", f"[查看运行日志]({run_url})", f"[查看仓库]({repo_url})", "", "> 仅供策略筛选和复盘，不构成买卖指令。"])
          content = "\n".join(parts)
          encoded = content.encode("utf-8")
          if len(encoded) > 3900:
              encoded = encoded[:3900]
              content = encoded.decode("utf-8", errors="ignore") + "\n\n...内容已截断，请查看 GitHub 报告。"

          payload = {
              "msgtype": "markdown",
              "markdown": {"content": content},
          }
          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=20) as response:
              body = response.read().decode("utf-8", errors="replace")
          print(body)
          PY
